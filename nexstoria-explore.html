<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explore Stories — NexStoria</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --coral:#ff6b6b; --coral2:#ff4757;
  --lav:#a78bfa; --lav2:#7c3aed;
  --mint:#06d6a0; --sun:#ffd166;
  --sky:#38bdf8; --pink:#f472b6;
  --ink:#1a1a2e; --soft:#6b7a9e;
  --muted:#94a3b8; --border:#e2e8f7;
  --off:#f8faff; --white:#fff;
  --card:#ffffff;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Nunito',sans-serif;background:var(--off);color:var(--ink);overflow-x:hidden;}

/* NAV */
nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,0.9);backdrop-filter:blur(10px);padding:15px 5%;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);}
.logo{font-family:'Baloo 2';font-size:28px;font-weight:800;color:var(--coral);text-decoration:none;}

/* JOM BACA */
.jom-baca-section{max-width:1200px;margin:28px auto 0;padding:0 20px;}
.jb-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:14px;}
.jb-title{font-family:'Baloo 2',cursive;font-size:1.4rem;font-weight:800;color:var(--ink);margin-bottom:2px;}
.jb-sub{font-size:0.78rem;color:var(--muted);}
.jb-lihat-semua{font-size:0.82rem;font-weight:800;color:var(--lav);text-decoration:none;white-space:nowrap;}
.jb-lihat-semua:hover{color:var(--lav2);}
.jb-scroll{display:flex;gap:14px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none;}
.jb-scroll::-webkit-scrollbar{display:none;}
.jb-card{min-width:185px;max-width:185px;background:white;border-radius:18px;border:1.5px solid var(--border);overflow:hidden;cursor:pointer;position:relative;transition:0.25s cubic-bezier(0.175,0.885,0.32,1.275);flex-shrink:0;box-shadow:0 2px 10px rgba(26,26,46,0.05);}
.jb-card:hover{transform:translateY(-6px);box-shadow:0 12px 28px rgba(26,26,46,0.1);border-color:var(--sky);}
.jb-cover{height:108px;display:flex;align-items:center;justify-content:center;font-size:2.8rem;}
.jb-info{padding:10px 12px 13px;}
.jb-category{font-size:0.64rem;font-weight:800;color:var(--sky);margin-bottom:3px;text-transform:uppercase;letter-spacing:0.5px;}
.jb-name{font-family:'Baloo 2',cursive;font-size:0.88rem;font-weight:800;color:var(--ink);margin-bottom:3px;line-height:1.2;}
.jb-meta{font-size:0.68rem;color:var(--soft);margin-bottom:3px;}
.jb-reads{font-size:0.68rem;font-weight:700;color:var(--muted);}
.jb-badge{position:absolute;top:8px;right:8px;font-size:0.58rem;font-weight:800;padding:3px 8px;border-radius:7px;}
.jb-skeleton{min-width:185px;height:180px;border-radius:18px;background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

/* DIVIDER */
.section-divider{max-width:1200px;margin:28px auto 0;padding:0 20px;display:flex;align-items:center;gap:12px;}
.sd-line{flex:1;height:1.5px;background:var(--border);}
.sd-label{font-family:'Baloo 2',cursive;font-size:0.95rem;font-weight:800;color:var(--soft);white-space:nowrap;}

/* SEARCH */
.search-container{max-width:1200px;margin:20px auto;padding:0 20px;}
.search-input{width:100%;padding:15px 20px 15px 45px;border-radius:20px;border:2px solid var(--border);font-family:'Nunito';font-size:16px;outline:none;transition:0.3s;background:white url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="%2394a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>') no-repeat 15px center;}
.search-input:focus{border-color:var(--sky);box-shadow:0 0 15px rgba(56,189,248,0.1);}

/* FILTERS */
.filter-container{max-width:1200px;margin:0 auto;padding:0 20px;display:flex;flex-direction:column;gap:15px;}
.filter-group{display:flex;flex-direction:column;gap:8px;}
.filter-label{font-family:'Baloo 2';font-weight:800;color:var(--ink);font-size:15px;}
.filter-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none;}
.filter-row::-webkit-scrollbar{display:none;}
.f-btn{white-space:nowrap;padding:8px 18px;border-radius:50px;border:2px solid var(--border);background:white;color:var(--soft);font-weight:700;cursor:pointer;transition:0.2s;font-size:13px;font-family:'Nunito';}
.f-btn.active{background:var(--sky);border-color:var(--sky);color:white;box-shadow:0 4px 10px rgba(56,189,248,0.2);}

/* STORY GRID */
.story-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:25px;padding:20px;max-width:1200px;margin:0 auto;}
.story-card{background:var(--card);border-radius:24px;border:2px solid var(--border);overflow:hidden;transition:0.3s cubic-bezier(0.175,0.885,0.32,1.275);cursor:pointer;position:relative;display:flex;flex-direction:column;animation:slideUp 0.5s ease backwards;}
@keyframes slideUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.story-card:hover{transform:translateY(-8px);border-color:var(--sky);box-shadow:0 15px 30px rgba(56,189,248,0.15);}
.sc-cover{height:180px;display:flex;align-items:center;justify-content:center;font-size:70px;position:relative;}
.sc-badge{position:absolute;top:12px;left:12px;padding:4px 10px;border-radius:8px;font-size:11px;font-weight:800;color:white;}
.badge-new{background:var(--mint);}
.badge-hot{background:var(--coral);}
.sc-lang-badge{position:absolute;bottom:10px;right:10px;background:rgba(0,0,0,0.6);color:white;padding:4px 8px;border-radius:8px;font-size:10px;font-weight:700;backdrop-filter:blur(4px);}
.sc-body{padding:20px;flex-grow:1;}
.sc-category{font-size:11px;font-weight:800;color:var(--sky);margin-bottom:4px;text-transform:uppercase;letter-spacing:1px;}
.sc-title{font-family:'Baloo 2';font-size:20px;font-weight:800;margin-bottom:5px;color:var(--ink);line-height:1.2;}
.sc-synopsis{font-size:13px;color:var(--soft);line-height:1.5;margin-bottom:15px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.sc-footer{display:flex;justify-content:space-between;align-items:center;padding-top:12px;border-top:1px dashed var(--border);}
.sc-age{font-size:11px;font-weight:800;color:white;background:var(--lav);padding:3px 8px;border-radius:6px;}
.sc-reads{font-size:12px;font-weight:700;color:var(--soft);}
.sc-actions{display:flex;gap:8px;padding:0 20px 20px;}
.btn-mini{flex:1;border:none;background:var(--off);padding:8px;border-radius:10px;font-size:12px;font-weight:700;color:var(--soft);cursor:pointer;transition:0.2s;font-family:'Nunito';}
.btn-mini:hover{background:var(--border);color:var(--ink);}

/* EMPTY STATE */
.empty-state{grid-column:1/-1;text-align:center;padding:4rem 1rem;}
.empty-state div:first-child{font-size:3rem;margin-bottom:0.8rem;}

/* LOAD MORE */
.load-more-container{text-align:center;margin-top:30px;padding-bottom:50px;}
#load-more{background:white;border:2px solid var(--border);padding:15px 40px;border-radius:18px;font-family:'Baloo 2';font-size:16px;font-weight:800;color:var(--soft);cursor:pointer;transition:0.2s;}
#load-more:hover{border-color:var(--sky);color:var(--sky);transform:translateY(-2px);}
#load-more.loading{opacity:0.7;pointer-events:none;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(26,26,46,0.85);display:none;align-items:center;justify-content:center;z-index:1000;padding:20px;backdrop-filter:blur(5px);}
.modal-content{background:white;padding:40px 30px;border-radius:30px;max-width:380px;width:100%;text-align:center;animation:popIn 0.3s;}
@keyframes popIn{from{transform:scale(0.8);opacity:0;}to{transform:scale(1);opacity:1;}}
.btn-reg{display:block;background:var(--coral);color:white;padding:16px;border-radius:15px;text-decoration:none;font-weight:800;margin-top:20px;box-shadow:0 4px 0 var(--coral2);}

/* Cover colours */
.cov-Haiwan{background:linear-gradient(135deg,#d1fae5,#a7f3d0);}
.cov-Sains{background:linear-gradient(135deg,#bfdbfe,#c7d2fe);}
.cov-Dongeng{background:linear-gradient(135deg,#e9d5ff,#ddd6fe);}
.cov-Teladan{background:linear-gradient(135deg,#fde68a,#fca5a5);}
.cov-Misteri{background:linear-gradient(135deg,#faf5ff,#ede9fe);}
.cov-Wira{background:linear-gradient(135deg,#fce7f3,#fbcfe8);}
.cov-Alam{background:linear-gradient(135deg,#ccfbf1,#99f6e4);}
.cov-default{background:linear-gradient(135deg,#f0f9ff,#e0f2fe);}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">🚀 NexStoria</a>
  <div style="font-weight:700;color:var(--soft);font-size:14px;">Teroka Dunia Imaginasi!</div>
</nav>

<!-- JOM BACA -->
<div class="jom-baca-section">
  <div class="jb-header">
    <div>
      <h2 class="jb-title">📖 Jom Baca!</h2>
      <p class="jb-sub">Cerita-cerita pilihan yang paling disukai</p>
    </div>
    <a href="#semua-cerita" class="jb-lihat-semua">Lihat Semua →</a>
  </div>
  <div class="jb-scroll" id="jom-baca-scroll">
    <!-- skeleton loading -->
    <div class="jb-skeleton"></div>
    <div class="jb-skeleton"></div>
    <div class="jb-skeleton"></div>
    <div class="jb-skeleton"></div>
    <div class="jb-skeleton"></div>
  </div>
</div>

<!-- DIVIDER -->
<div class="section-divider" id="semua-cerita">
  <div class="sd-line"></div>
  <span class="sd-label">🔍 Semua Cerita</span>
  <div class="sd-line"></div>
</div>

<div class="search-container">
  <input type="text" id="search-input" class="search-input" placeholder="Cari tajuk cerita..." oninput="filterStories()">
</div>

<div class="filter-container">
  <div class="filter-group">
    <span class="filter-label">Kumpulan Umur:</span>
    <div class="filter-row" id="age-filters">
      <button class="f-btn active" onclick="setFilter('age','all',this)">Semua</button>
      <button class="f-btn" onclick="setFilter('age','4-6',this)">👶 Prasekolah (4-6)</button>
      <button class="f-btn" onclick="setFilter('age','7-9',this)">👦 Kanak-kanak (7-9)</button>
      <button class="f-btn" onclick="setFilter('age','10-12',this)">🧑‍🎓 Remaja (10-12)</button>
    </div>
  </div>
  <div class="filter-group">
    <span class="filter-label">Kategori:</span>
    <div class="filter-row" id="cat-filters">
      <button class="f-btn active" onclick="setFilter('cat','all',this)">Semua</button>
      <button class="f-btn" onclick="setFilter('cat','Haiwan',this)">🦁 Haiwan</button>
      <button class="f-btn" onclick="setFilter('cat','Sains',this)">🚀 Sains</button>
      <button class="f-btn" onclick="setFilter('cat','Dongeng',this)">🐉 Dongeng</button>
      <button class="f-btn" onclick="setFilter('cat','Misteri',this)">🧩 Misteri</button>
      <button class="f-btn" onclick="setFilter('cat','Teladan',this)">🕌 Teladan</button>
      <button class="f-btn" onclick="setFilter('cat','Wira',this)">🛡️ Wira</button>
      <button class="f-btn" onclick="setFilter('cat','Alam',this)">🌿 Alam</button>
    </div>
  </div>
</div>

<div class="story-grid" id="story-grid"></div>

<div class="load-more-container">
  <button id="load-more" onclick="loadMore()">↓ Muatkan Lebih Banyak Cerita</button>
</div>

<div id="auth-modal" class="modal-overlay">
  <div class="modal-content">
    <div style="font-size:50px;">🌟</div>
    <h2 style="font-family:'Baloo 2';">Daftar NexStoria!</h2>
    <p style="color:var(--soft);margin-top:10px;">Daftar untuk Suka, Komen, atau Kongsi cerita hebat ini bersama rakan-rakan!</p>
    <a href="nexstoria-login.html" class="btn-reg">Daftar Percuma 🚀</a>
    <button onclick="closeModal()" style="margin-top:15px;background:none;border:none;color:var(--muted);font-weight:700;cursor:pointer;">Nanti Dahulu</button>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://lkeehgivbuhkwdfrvexm.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxrZWVoZ2l2YnVoa3dkZnJ2ZXhtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5MDg3OTIsImV4cCI6MjA4ODQ4NDc5Mn0.DgNMgoRjNOJK4uh-74lrpkMqM9_fiJi2j81RxQzNx3s';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let allStories = [];
let activeAge = 'all';
let activeCat = 'all';
let page = 0;
const PER_PAGE = 6;

// ── COVER COLORS ──
const coverColors = {
  'Haiwan':'cov-Haiwan','Sains':'cov-Sains','Dongeng':'cov-Dongeng',
  'Teladan':'cov-Teladan','Misteri':'cov-Misteri','Wira':'cov-Wira','Alam':'cov-Alam'
};

function covClass(cat) { return coverColors[cat] || 'cov-default'; }

function formatReads(n) {
  if (n >= 1000) return (n/1000).toFixed(1).replace('.0','') + 'k';
  return String(n);
}

// ── JOM BACA ──
async function loadJomBaca() {
  const { data } = await sb.from('stories')
    .select('id,title,emoji,category,age_group,reads_count,is_featured,synopsis')
    .eq('status','published')
    .eq('is_featured', true)
    .order('reads_count', { ascending: false })
    .limit(8);

  const scroll = document.getElementById('jom-baca-scroll');
  scroll.innerHTML = '';

  if (!data || data.length === 0) {
    scroll.innerHTML = '<div style="color:var(--muted);font-size:0.85rem;padding:1rem;">Belum ada cerita pilihan.</div>';
    return;
  }

  data.forEach((s, i) => {
    let badge = '';
    if (i === 0) badge = `<span class="jb-badge" style="background:var(--sun);color:#78350f;">🏆 #1</span>`;
    else if (s.reads_count > 2000) badge = `<span class="jb-badge" style="background:var(--coral);color:white;">🔥 Hot</span>`;

    const card = document.createElement('div');
    card.className = 'jb-card';
    card.onclick = () => window.location.href = 'nexstoria-reader.html';
    card.innerHTML = `
      <div class="jb-cover ${covClass(s.category)}">${s.emoji || '📖'}</div>
      <div class="jb-info">
        <div class="jb-category">${s.category}</div>
        <div class="jb-name">${s.title}</div>
        <div class="jb-meta">🎯 ${s.age_group} thn</div>
        <div class="jb-reads">👁 ${formatReads(s.reads_count)}</div>
      </div>
      ${badge}
    `;
    scroll.appendChild(card);
  });
}

// ── STORY GRID ──
function createCard(s, index) {
  const card = document.createElement('div');
  card.className = 'story-card';
  card.setAttribute('data-title', s.title.toLowerCase());
  card.setAttribute('data-age', s.age_group);
  card.setAttribute('data-cat', s.category);
  card.style.animationDelay = (index * 0.07) + 's';
  card.onclick = () => window.location.href = 'nexstoria-reader.html';

  const isHot = s.reads_count > 2000;
  const badge = isHot
    ? `<span class="sc-badge badge-hot">🔥 Hangat</span>`
    : '';

  card.innerHTML = `
    <div class="sc-cover ${covClass(s.category)}">${s.emoji || '📖'}
      ${badge}
      <span class="sc-lang-badge">BM · EN</span>
    </div>
    <div class="sc-body">
      <div class="sc-category">${s.category}</div>
      <div class="sc-title">${s.title}</div>
      <p class="sc-synopsis">${s.synopsis || ''}</p>
      <div class="sc-footer">
        <span class="sc-age">${s.age_group} thn</span>
        <span class="sc-reads">👁 ${formatReads(s.reads_count)}</span>
      </div>
    </div>
    <div class="sc-actions">
      <button class="btn-mini" onclick="openAuth(event)">❤️ Suka</button>
      <button class="btn-mini" onclick="openAuth(event)">💬 Komen</button>
      <button class="btn-mini" onclick="openAuth(event)">🔗 Kongsi</button>
    </div>
  `;
  return card;
}

async function loadStories() {
  const { data } = await sb.from('stories')
    .select('id,title,emoji,category,age_group,reads_count,synopsis,status')
    .eq('status','published')
    .order('reads_count', { ascending: false });

  allStories = data || [];
  page = 0;
  renderGrid();
}

function getFiltered() {
  const q = document.getElementById('search-input').value.toLowerCase();
  return allStories.filter(s => {
    const matchAge = activeAge === 'all' || s.age_group === activeAge;
    const matchCat = activeCat === 'all' || s.category === activeCat;
    const matchQ   = !q || s.title.toLowerCase().includes(q);
    return matchAge && matchCat && matchQ;
  });
}

function renderGrid() {
  const grid = document.getElementById('story-grid');
  const filtered = getFiltered();
  const slice = filtered.slice(0, (page + 1) * PER_PAGE);

  grid.innerHTML = '';
  if (slice.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div>😔</div><div style="font-weight:800;font-size:1rem;margin-bottom:4px;">Tiada cerita ditemui</div><div style="font-size:0.82rem;color:var(--muted);">Cuba carian atau filter yang lain.</div></div>`;
  } else {
    slice.forEach((s, i) => grid.appendChild(createCard(s, i)));
  }

  const btn = document.getElementById('load-more');
  if (slice.length >= filtered.length) {
    btn.textContent = '✅ Semua Cerita Dipaparkan';
    btn.disabled = true;
  } else {
    btn.textContent = '↓ Muatkan Lebih Banyak Cerita';
    btn.disabled = false;
  }
}

function loadMore() {
  const btn = document.getElementById('load-more');
  btn.classList.add('loading');
  btn.textContent = '⏳ Memuatkan…';
  setTimeout(() => {
    page++;
    renderGrid();
    btn.classList.remove('loading');
  }, 600);
}

// ── FILTERS ──
function setFilter(type, val, el) {
  if (type === 'age') {
    activeAge = val;
    document.querySelectorAll('#age-filters .f-btn').forEach(b => b.classList.remove('active'));
  } else {
    activeCat = val;
    document.querySelectorAll('#cat-filters .f-btn').forEach(b => b.classList.remove('active'));
  }
  el.classList.add('active');
  page = 0;
  renderGrid();
}

function filterStories() {
  page = 0;
  renderGrid();
}

// ── MODAL ──
function openAuth(e) {
  e.stopPropagation();
  document.getElementById('auth-modal').style.display = 'flex';
}
function closeModal() {
  document.getElementById('auth-modal').style.display = 'none';
}

// ── INIT ──
loadJomBaca();
loadStories();
</script>

</body>
</html>
