<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">Profil Pembaca — NexStoria</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700;800&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --coral:#ff6b6b;--coral2:#ff4757;
  --lav:#a78bfa;--lav2:#7c3aed;
  --mint:#06d6a0;--sun:#ffd166;
  --sky:#38bdf8;--pink:#f472b6;
  --orange:#fb923c;
  --ink:#1a1a2e;--soft:#6b7a9e;
  --muted:#94a3b8;--border:#e2e8f7;
  --off:#f8faff;--white:#fff;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Nunito',sans-serif;background:var(--off);color:var(--ink);overflow-x:hidden;}

/* ── NAV ── */
nav{
  position:sticky;top:0;z-index:100;
  background:rgba(255,255,255,0.96);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);height:60px;padding:0 2rem;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 2px 16px rgba(26,26,46,0.05);
}
.nav-logo{font-family:'Baloo 2',cursive;font-size:1.6rem;font-weight:800;color:var(--coral);text-decoration:none;display:flex;align-items:center;gap:4px;}
.nav-logo em{color:var(--lav);font-style:normal;}

/* ── BANNER ── */
.profile-banner{
  height:200px;position:relative;overflow:hidden;
  background:linear-gradient(135deg,#0f0f1e 0%,#1a2040 40%,#0f1e2a 100%);
}

/* ── PROFILE CARD ── */
.profile-wrap{max-width:1060px;margin:0 auto;padding:0 1.5rem 5rem;}
.profile-card{
  background:white;border:1.5px solid var(--border);
  border-radius:24px;padding:0 2rem 2rem;
  margin-top:-70px;position:relative;z-index:2;
  box-shadow:0 8px 40px rgba(26,26,46,0.08);
  margin-bottom:1.5rem;
}

.avatar-row{
  display:flex;align-items:flex-end;justify-content:space-between;
  flex-wrap:wrap;gap:1rem;margin-bottom:1.5rem;
}
.avatar-wrap{margin-top:-45px;position:relative;}
.reader-avatar{
  width:120px;height:120px;border-radius:30px;
  background:linear-gradient(135deg,#bfdbfe,#c7d2fe,#ddd6fe);
  display:flex;align-items:center;justify-content:center;
  font-size:4rem;border:4px solid white;
  box-shadow:0 8px 24px rgba(26,26,46,0.12);
}

.reader-name{font-family:'Baloo 2',cursive;font-size:1.8rem;font-weight:800;color:var(--ink);margin-bottom:2px;}
.reader-handle{font-size:0.9rem;color:var(--muted);margin-bottom:1rem;}
.reader-bio{font-size:0.9rem;color:var(--soft);line-height:1.7;max-width:600px;}

/* ── SECTIONS ── */
.section-container{margin-top:2rem;padding:1.5rem;background:white;border-radius:18px;border:1.5px solid var(--border);}
.section-title{font-family:'Baloo 2',cursive;font-size:1.1rem;margin-bottom:1rem;color:var(--ink);}
.empty-placeholder{color:var(--muted);font-style:italic;font-size:0.85rem;}

.btn-logout{
  margin-top:2rem;padding:8px 20px;border-radius:10px;
  border:1.5px solid var(--border);background:white;
  color:var(--coral);font-weight:700;cursor:pointer;transition:0.2s;
  font-family:'Nunito',sans-serif;font-size:0.85rem;
}
.btn-logout:hover{background:var(--coral);color:white;border-color:var(--coral);}
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">Nex<em>Storia</em> 🌏</a>
</nav>

<div class="profile-banner"></div>

<div class="profile-wrap">
  <div class="profile-card">
    <div class="avatar-row">
      <div class="avatar-wrap">
        <div class="reader-avatar" id="p-avatar">👦</div>
      </div>
    </div>

    <h1 class="reader-name" id="p-display-name">---</h1>
    <div class="reader-handle" id="p-username">@---</div>
    <div class="reader-bio" id="p-bio">Selamat datang ke profil NexStoria anda.</div>

    <button class="btn-logout" onclick="doLogout()">Log Keluar</button>
  </div>

  <div class="section-container">
    <h3 class="section-title">Rentak Membaca</h3>
    <div class="empty-placeholder">Tiada data rentak buat masa ini.</div>
  </div>

  <div class="section-container">
    <h3 class="section-title">Aktiviti Terkini</h3>
    <div class="empty-placeholder">Belum ada aktiviti direkodkan.</div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://lkeehgivbuhkwdfrvexm.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxrZWVoZ2l2YnVoa3dkZnJ2ZXhtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5MDg3OTIsImV4cCI6MjA4ODQ4NDc5Mn0.DgNMgoRjNOJK4uh-74lrpkMqM9_fiJi2j81RxQzNx3s';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function loadProfile() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    window.location.href = 'nexstoria-login.html';
    return;
  }

  const user = session.user;
  const meta = user.user_metadata || {};

  const { data: p } = await sb.from('profiles').select('*').eq('id', user.id).single();

  const name     = p?.full_name || meta.full_name || user.email.split('@')[0];
  const username = p?.username  || user.email.split('@')[0];
  const bio      = p?.bio       || 'Selamat datang ke profil NexStoria anda.';
  const initial  = name[0].toUpperCase();

  document.getElementById('p-display-name').textContent = name;
  document.getElementById('p-username').textContent = '@' + username;
  document.getElementById('p-bio').textContent = bio;
  document.getElementById('p-avatar').textContent = initial;
  document.title = name + ' — Profil Pembaca NexStoria';
}

async function doLogout() {
  await sb.auth.signOut();
  window.location.href = 'nexstoria-login.html';
}

loadProfile();
</script>

</body>
</html>
